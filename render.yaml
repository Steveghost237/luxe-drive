services:
  - type: web
    name: luxe-drive-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luxe-drive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 30
      - key: DEBUG
        value: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: AT_USERNAME
        value: ""
      - key: AT_API_KEY
        value: ""
    healthCheckPath: /health

databases:
  - name: luxe-drive-db
    databaseName: luxe_drive
    user: luxe_drive_user
    plan: free
