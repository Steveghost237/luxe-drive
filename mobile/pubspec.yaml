name: luxe_drive
description: Luxe Drive — Location, chauffeur privé et vente de véhicules de luxe
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.1.0
  dio: ^5.4.0

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Géolocalisation
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3

  # Permissions & Médias
  permission_handler: ^11.2.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.4

  # Internationalisation
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
